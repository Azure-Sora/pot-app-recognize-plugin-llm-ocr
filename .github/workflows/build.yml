name: Build

on: push

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Validate plugin
        run: |
          node --check main.js
          node -e "JSON.parse(require('fs').readFileSync('info.json', 'utf8'))"
          node --test test/main.test.js

      - name: Read plugin metadata
        run: |
          NAME=$(node -p 'require("./info.json").id')
          ICON=$(node -p 'require("./info.json").icon')
          echo "NAME=$NAME" >> "$GITHUB_ENV"
          echo "ICON=$ICON" >> "$GITHUB_ENV"

      - name: Package plugin
        uses: vimtor/action-zip@v1
        with:
          files: info.json ${{ env.ICON }} main.js
          dest: ${{ env.NAME }}.potext

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ env.NAME }}.potext
          path: "*.potext"
          if-no-files-found: error

      - name: Upload release asset
        if: startsWith(github.ref, 'refs/tags')
        uses: softprops/action-gh-release@v2
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          files: "*.potext"
